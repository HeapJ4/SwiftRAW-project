name: Bug report
description: Report a reproducible problem in SwiftRAW
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open…
        2. Select…
        3. See…
    validations:
      required: true
  - type: input
    attributes:
      label: SwiftRAW version
    validations:
      required: true
  - type: input
    attributes:
      label: Android version and device
    validations:
      required: true
  - type: input
    attributes:
      label: File format
      description: For example NEF, CR3 or ARW. Do not upload private photographs.
